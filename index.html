<!DOCTYPE html>
<html>

<head>

<title>Water Flow Optimization System</title>

<link rel="stylesheet" href="/static/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h1>Water Distribution Optimization</h1>

<div class="container">

<!-- Input Section -->

<div class="card">

<h2>Network Input</h2>

<p>Add pipes between nodes with capacity and base cost.</p>

<div class="form">

<input id="from" placeholder="From Node (S, A...)">

<input id="to" placeholder="To Node (T, B...)">

<input id="capacity" placeholder="Capacity">

<input id="cost" placeholder="Base Cost">

<button onclick="addEdge()">Add Pipe</button>

</div>

</div>


<!-- Pipe List -->

<div class="card">

<h2>Network Pipes</h2>

<p>List of pipes added to the network.</p>

<ul id="edgeList"></ul>

<button onclick="runSimulation()">Run Optimization</button>

</div>


<!-- Results -->

<div class="card">

<h2>Results</h2>

<div id="result"></div>

<canvas id="flowChart"></canvas>

</div>

</div>


<script src="/static/script.js"></script>

</body>

</html>
